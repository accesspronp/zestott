<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login | Zest OTT</title><link rel="icon" href="favicon.ico"><link rel="apple-touch-icon" href="favicon.png">
<style>:root{--bg:#eef9ff;--card:rgba(255,255,255,.86);--ink:#09243a;--muted:#557085;--blue:#2ea8ff;--deep:#1374d9;--green:#16c784;--line:rgba(19,116,217,.16);--shadow:0 24px 70px rgba(19,116,217,.16)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,var(--bg),#fff 42%,#dff3ff);color:var(--ink);min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:0 18px}a{text-decoration:none;color:inherit}.nav{position:sticky;top:0;background:rgba(255,255,255,.75);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);z-index:10}.navin{display:flex;align-items:center;justify-content:space-between;padding:14px 0}.brand{display:flex;gap:12px;align-items:center}.logo{width:50px;height:50px;border-radius:18px;background:linear-gradient(135deg,#72d8ff,#2ea8ff,#fff);display:block;object-fit:cover;background:#fff}.brand h1{margin:0;font-size:23px}.brand p{margin:0;color:var(--muted);font-size:12px}.btn{border:0;border-radius:16px;padding:12px 18px;font-weight:900;cursor:pointer;display:inline-flex;gap:8px;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(19,116,217,.1);background:#fff}.btn.green{background:linear-gradient(135deg,#25d366,#15b86d);color:#fff}.btn.dark{color:var(--deep);border:1px solid var(--line)}.btn.small{padding:9px 12px;border-radius:12px;font-size:13px}.page{min-height:calc(100vh - 82px);display:grid;place-items:center;padding:44px 18px}.panel{width:min(520px,100%);background:var(--card);border:1px solid var(--line);border-radius:30px;padding:28px;box-shadow:var(--shadow)}h2{font-size:36px;margin:0 0 8px}.sub{margin:0 0 20px;color:var(--muted);line-height:1.5}.form{display:grid;gap:14px}.form label{font-weight:900}.form input{width:100%;margin-top:7px;border-radius:16px;padding:14px 15px;background:#fff;border:1px solid var(--line);outline:none}.notice{border-left:4px solid var(--blue);background:#eaf8ff;padding:13px;border-radius:14px;color:#173b54;font-size:14px}.userbar{margin-top:14px;color:var(--muted);font-size:14px}.row{display:flex;gap:10px;flex-wrap:wrap}.row .btn{flex:1}.hide{display:none}</style></head><body>
<nav class="nav"><div class="wrap navin"><a class="brand" href="index.html"><img class="logo" src="zest-brand-icon.png" alt="Zest OTT logo"><div><h1>Zest OTT</h1><p>Digital Authorized Online Store</p></div></a><div class="row"><a class="btn dark small" href="index.html">Home</a><a class="btn dark small" href="cart.html">Cart</a><a class="btn dark small" href="orders.html">Orders</a></div></div></nav>
<main class="page"><section class="panel"><h2 id="authTitle">Login</h2><p class="sub" id="authSub">Use your email and password. New email will register automatically.</p><p class="notice">Choose Login or Sign Up from the website. After login you can set your username.</p>
<form class="form" id="loginForm"><label>Email<input id="loginEmail" type="email" required placeholder="your@email.com"></label><label>Password<input id="loginPassword" type="password" required minlength="4" placeholder="Password"></label><button class="btn green" id="authBtn" type="submit">Login / Sign Up</button><div class="row"><a class="btn dark" href="login.html">Login</a><a class="btn dark" href="login.html?mode=signup">Sign Up</a></div></form>
<form class="form hide" id="profileForm" style="margin-top:18px"><label>Set username<input id="username" required placeholder="Your display name"></label><div class="row"><button class="btn green" type="submit">Save Username</button><button class="btn dark" type="button" id="logoutBtn">Logout</button></div></form><div class="userbar" id="userbar"></div></section></main>
<script>

const mode = new URLSearchParams(location.search).get('mode');
if(mode==='signup'){
  authTitle.textContent='Sign Up';
  authSub.textContent='Create your account to manage orders, receipts and order history.';
  authBtn.textContent='Create Account';
}

function getUsers(){return JSON.parse(localStorage.getItem('zest_users')||'[]')}function saveUsers(u){localStorage.setItem('zest_users',JSON.stringify(u))}function getSession(){try{return JSON.parse(localStorage.getItem('zest_current_user')||'null')}catch(e){return null}}function setSession(user){localStorage.setItem('zest_current_user',JSON.stringify({email:user.email,username:user.username||'',createdAt:user.createdAt,lastLogin:new Date().toISOString()}))}function nextUrl(){return new URLSearchParams(location.search).get('next')||'index.html'}
function showProfile(){const u=getSession(); if(!u)return; loginForm.classList.add('hide'); profileForm.classList.remove('hide'); username.value=u.username||''; userbar.innerHTML=`Logged in as <b>${u.email}</b>`;}
loginForm.addEventListener('submit',e=>{e.preventDefault();const email=loginEmail.value.trim().toLowerCase();const password=loginPassword.value;let users=getUsers();let user=users.find(u=>u.email===email);if(user&&user.password!==password){alert('Wrong password for this email.');return;}if(!user){user={email,password,username:'',createdAt:new Date().toISOString()};users.push(user);saveUsers(users);}setSession(user); if(!user.username){showProfile();}else{location.href=nextUrl();}});
profileForm.addEventListener('submit',e=>{e.preventDefault();let s=getSession();let users=getUsers();let u=users.find(x=>x.email===s.email); if(u){u.username=username.value.trim();saveUsers(users);setSession(u);} location.href=nextUrl();});
logoutBtn.addEventListener('click',()=>{localStorage.removeItem('zest_current_user');location.href='login.html'}); if(getSession())showProfile();
</script></body></html>
