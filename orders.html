<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Orders | Zest OTT</title><link rel="icon" href="favicon.ico"><link rel="apple-touch-icon" href="favicon.png"><style>:root{--bg:#eef9ff;--card:rgba(255,255,255,.86);--ink:#09243a;--muted:#557085;--blue:#2ea8ff;--deep:#1374d9;--green:#16c784;--line:rgba(19,116,217,.16);--shadow:0 24px 70px rgba(19,116,217,.16)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,var(--bg),#fff 42%,#dff3ff);color:var(--ink);min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:0 18px}a{text-decoration:none;color:inherit}.nav{position:sticky;top:0;background:rgba(255,255,255,.75);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);z-index:10}.navin{display:flex;align-items:center;justify-content:space-between;padding:14px 0}.brand{display:flex;gap:12px;align-items:center}.logo{width:50px;height:50px;border-radius:18px;object-fit:cover;background:#fff}.brand h1{margin:0;font-size:23px}.brand p{margin:0;color:var(--muted);font-size:12px}.links{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:12px 18px;font-weight:900;cursor:pointer;display:inline-flex;gap:8px;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(19,116,217,.1);background:#fff}.btn.green{background:linear-gradient(135deg,#25d366,#15b86d);color:#fff}.btn.dark{color:var(--deep);border:1px solid var(--line)}.btn.small{padding:9px 12px;border-radius:12px;font-size:13px}.page{padding:42px 0}.panel{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}h2{font-size:36px;margin:0 0 6px}.sub{color:var(--muted);margin:0 0 22px}.order{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 12px 28px rgba(19,116,217,.08)}.orderTop{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.status{background:#eaf8ff;color:#1374d9;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:1000}.items{margin:12px 0;color:var(--muted);line-height:1.6}.total{font-size:24px;font-weight:1000;color:#073b66}.empty{text-align:center;padding:42px;color:var(--muted)}@media(max-width:560px){.navin{align-items:flex-start;gap:12px;flex-direction:column}.links{width:100%}.btn.small{flex:1}}</style></head><body><nav class="nav"><div class="wrap navin"><a class="brand" href="index.html"><img class="logo" src="zest-brand-icon.png" alt="Zest OTT logo"><div><h1>Zest OTT</h1><p>Digital Authorized Online Store</p></div></a><div class="links"><a class="btn dark small" href="index.html">Home</a><a class="btn dark small" href="cart.html">Cart</a><a class="btn dark small" href="login.html">Login</a><a class="btn dark small" href="login.html?mode=signup">Sign Up</a><a class="btn green small" href="https://wa.me/9779743583995" target="_blank">WhatsApp</a></div></div></nav><main class="wrap page"><h2>My Orders</h2><p class="sub">After checkout, your saved orders will appear here.</p><section class="panel" id="ordersBox"></section></main><script>function getSession(){try{return JSON.parse(localStorage.getItem('zest_current_user')||'null')}catch(e){return null}}const current=getSession();const orders=JSON.parse(localStorage.getItem('zest_orders')||'[]');const mine=current?orders.filter(o=>!o.userEmail||o.userEmail===current.email):orders;if(!mine.length){ordersBox.innerHTML='<div class="empty"><h3>No orders yet</h3><p>Place an order from any plan and it will show here.</p><a class="btn green" href="index.html#products">Browse Plans</a></div>';}else{ordersBox.innerHTML=mine.map(o=>`<div class="order"><div class="orderTop"><div><b>${o.id}</b><br><small>${o.date||''}</small></div><span class="status">${o.status||'Order placed'}</span></div><div class="items">${(o.items||[]).map(p=>`${p.name} - ${p.plan} (Rs. ${p.price})`).join('<br>')}</div><div class="total">Total: Rs. ${o.total||0}</div><p>Customer: <b>${o.customer||'-'}</b> • Phone: ${o.phone||'-'}</p><a class="btn dark small" href="receipt.html">Open Last Receipt</a></div>`).join('');}</script></body></html>
