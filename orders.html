<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Orders | Zest OTT</title><link rel="icon" href="favicon.ico"><link rel="apple-touch-icon" href="favicon.png"><style>:root{--bg:#eef9ff;--card:rgba(255,255,255,.86);--ink:#09243a;--muted:#557085;--blue:#2ea8ff;--deep:#1374d9;--green:#16c784;--line:rgba(19,116,217,.16);--shadow:0 24px 70px rgba(19,116,217,.16)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,var(--bg),#fff 42%,#dff3ff);color:var(--ink);min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:0 18px}a{text-decoration:none;color:inherit}.nav{position:sticky;top:0;background:rgba(255,255,255,.75);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);z-index:10}.navin{display:flex;align-items:center;justify-content:space-between;padding:14px 0}.brand{display:flex;gap:12px;align-items:center}.logo{width:50px;height:50px;border-radius:18px;object-fit:cover;background:#fff}.brand h1{margin:0;font-size:23px}.brand p{margin:0;color:var(--muted);font-size:12px}.links{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:12px 18px;font-weight:900;cursor:pointer;display:inline-flex;gap:8px;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(19,116,217,.1);background:#fff}.btn.green{background:linear-gradient(135deg,#25d366,#15b86d);color:#fff}.btn.dark{color:var(--deep);border:1px solid var(--line)}.btn.small{padding:9px 12px;border-radius:12px;font-size:13px}.page{padding:42px 0}.panel{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}h2{font-size:36px;margin:0 0 6px}.sub{color:var(--muted);margin:0 0 22px}.order{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 12px 28px rgba(19,116,217,.08)}.orderTop{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.status{background:#eaf8ff;color:#1374d9;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:1000}.items{margin:12px 0;color:var(--muted);line-height:1.6}.total{font-size:24px;font-weight:1000;color:#073b66}.empty{text-align:center;padding:42px;color:var(--muted)}@media(max-width:560px){.navin{align-items:flex-start;gap:12px;flex-direction:column}.links{width:100%}.btn.small{flex:1}}
/* Recent purchase popup */
.purchase-pop{position:fixed;left:16px;bottom:16px;z-index:80;width:min(310px,calc(100vw - 32px));background:rgba(255,255,255,.96);border:1px solid rgba(7,152,196,.22);border-radius:18px;box-shadow:0 20px 48px rgba(3,28,53,.20);padding:12px 13px;display:flex;align-items:center;gap:11px;transform:translateX(-120%);opacity:0;pointer-events:none;transition:transform .45s ease,opacity .45s ease;backdrop-filter:blur(14px)}
.purchase-pop.show{transform:translateX(0);opacity:1}.purchase-pop .popIcon{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#071527,#0798c4);display:grid;place-items:center;color:white;font-size:20px;box-shadow:0 10px 24px rgba(7,152,196,.22);flex:0 0 auto}.purchase-pop .popText{min-width:0}.purchase-pop .popText b{display:block;font-size:13px;color:#09243a;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.purchase-pop .popText span{display:block;margin-top:4px;font-size:12px;color:#607386;line-height:1.25}.purchase-pop .popCheck{margin-left:auto;width:22px;height:22px;border-radius:999px;background:#22c55e;color:white;font-size:12px;display:grid;place-items:center;font-weight:1000;flex:0 0 auto}.purchase-pop .popDot{display:inline-block;width:7px;height:7px;border-radius:999px;background:#22c55e;margin-right:5px;box-shadow:0 0 0 0 rgba(34,197,94,.5);animation:popDotPulse 1.8s infinite}@keyframes popDotPulse{70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}}@media(max-width:640px){.purchase-pop{left:10px;bottom:10px;width:min(290px,calc(100vw - 20px));padding:10px}.purchase-pop .popIcon{width:38px;height:38px}.wa{bottom:78px}}

</style></head><body><nav class="nav"><div class="wrap navin"><a class="brand" href="index.html"><img class="logo" src="zest-brand-icon.png" alt="Zest OTT logo"><div><h1>Zest OTT</h1><p>Digital Authorized Online Store</p></div></a><div class="links"><a class="btn dark small" href="index.html">Home</a><a class="btn dark small" href="cart.html">Cart</a><a class="btn dark small" href="login.html">Login</a><a class="btn dark small" href="login.html?mode=signup">Sign Up</a><a class="btn green small" href="https://wa.me/9779743583995" target="_blank">WhatsApp</a></div></div></nav><main class="wrap page"><h2>My Orders</h2><p class="sub">After checkout, your saved orders will appear here.</p><section class="panel" id="ordersBox"></section></main><script>function getSession(){try{return JSON.parse(localStorage.getItem('zest_current_user')||'null')}catch(e){return null}}const current=getSession();const orders=JSON.parse(localStorage.getItem('zest_orders')||'[]');const mine=current?orders.filter(o=>!o.userEmail||o.userEmail===current.email):orders;if(!mine.length){ordersBox.innerHTML='<div class="empty"><h3>No orders yet</h3><p>Place an order from any plan and it will show here.</p><a class="btn green" href="index.html#products">Browse Plans</a></div>';}else{ordersBox.innerHTML=mine.map(o=>`<div class="order"><div class="orderTop"><div><b>${o.id}</b><br><small>${o.date||''}</small></div><span class="status">${o.status||'Order placed'}</span></div><div class="items">${(o.items||[]).map(p=>`${p.name} - ${p.plan} (Rs. ${p.price})`).join('<br>')}</div><div class="total">Total: Rs. ${o.total||0}</div><p>Customer: <b>${o.customer||'-'}</b> • Phone: ${o.phone||'-'}</p><a class="btn dark small" href="receipt.html">Open Last Receipt</a></div>`).join('');}</script>
<div id="purchasePop" class="purchase-pop" aria-live="polite">
  <div class="popIcon">🛒</div>
  <div class="popText"><b>New purchase</b><span><i class="popDot"></i>Someone purchased a plan</span></div>
  <div class="popCheck">✓</div>
</div>


<script>
(function(){
  const pop=document.getElementById('purchasePop');
  if(!pop) return;
  const fallbackProducts=[
    {name:'Netflix Premium',plan:'6 Months'},{name:'Netflix Premium',plan:'12 Months'},
    {name:'CapCut Pro',plan:'1 Year'},{name:'Gemini AI Pro',plan:'18 Months'},
    {name:'ChatGPT Pro',plan:'12 Months'},{name:'Spotify Premium',plan:'12 Months'},
    {name:'Canva Pro',plan:'1 Year'},{name:'YouTube Premium',plan:'6 Months'},
    {name:'Prime Video',plan:'1 Month'},{name:'NordVPN',plan:'1 Year'}
  ];
  const shopProducts=(typeof PRODUCTS_DEFAULT!=='undefined' && Array.isArray(PRODUCTS_DEFAULT) && PRODUCTS_DEFAULT.length)
    ? PRODUCTS_DEFAULT.map(p=>({name:p.name||'Premium Product',plan:p.plan||'Premium Plan'}))
    : fallbackProducts;
  const buyers=[
    'Aarav Shrestha','Nisha Gurung','Rohit K.C.','Sneha Magar','Kiran Tamang','Sujan Rai','Prabin Bista','Maya Thapa',
    'Aayush Poudel','Ritika Lama','Bikash Adhikari','Rojan Maharjan','Samir Khadka','Pooja Basnet','Nabin Ghimire',
    'Ashish Yadav','Sagar Karki','Anisha Malla','Manish Sharma','Kripa Joshi','Bibek Rana','Sushmita Ale'
  ];
  const times=['about 50 minutes ago','about 55 minutes ago','about 1 hour ago','about 2 hours ago','about 3 hours ago','about 4 hours ago','about 5 hours ago','earlier today'];
  const icons=['🛒','🔥','✅','⚡','🎉','💳','⭐','📦'];
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  let lastText='';
  function pickDifferent(){
    let buyer=pick(buyers), item=pick(shopProducts), time=pick(times);
    let text=buyer+' purchased '+item.name;
    let tries=0;
    while(text===lastText && tries<8){ buyer=pick(buyers); item=pick(shopProducts); text=buyer+' purchased '+item.name; tries++; }
    lastText=text;
    return {buyer,item,time};
  }
  function showPurchase(){
    const data=pickDifferent();
    pop.querySelector('.popIcon').textContent=pick(icons);
    pop.querySelector('.popText b').textContent=data.buyer+' purchased '+data.item.name;
    pop.querySelector('.popText span').innerHTML='<i class="popDot"></i>'+data.item.plan+' plan • '+data.time;
    pop.classList.add('show');
    clearTimeout(window.__zestPopHide);
    window.__zestPopHide=setTimeout(()=>pop.classList.remove('show'),6200);
    clearTimeout(window.__zestPopNext);
    window.__zestPopNext=setTimeout(showPurchase,Math.floor(12000+Math.random()*14000));
  }
  setTimeout(showPurchase,1400+Math.random()*1800);
})();
</script>
