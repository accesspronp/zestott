<style>

*{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--white)}

.navin{display:flex;align-items:center;justify-content:space-between;padding:16px 0}.brand{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#ff2e9f,#ff8a00,#00e5ff);display:grid;place-items:center;font-weight:1000;font-size:20px;box-shadow:0 0 28px rgba(255,46,159,.25)}

.btn.green{background:linear-gradient(135deg,#39f178,#12c85b);color:#051108}.btn.dark{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12)}.btn.pink{background:linear-gradient(135deg,#ff2e9f,#7c3cff);color:white}.btn.small{padding:9px 12px;border-radius:12px;font-size:13px}
.hero{position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:-25%;background:radial-gradient(circle at 20% 10%,rgba(255,46,159,.35),transparent 28%),radial-gradient(circle at 80% 5%,rgba(32,231,255,.28),transparent 28%),radial-gradient(circle at 50% 60%,rgba(124,60,255,.18),transparent 30%);pointer-events:none}.hero-grid{position:relative;display:grid;grid-template-columns:1.05fr .95fr;gap:34px;align-items:center;padding:72px 0 52px}.badge{display:inline-flex;gap:8px;align-items:center;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);border-radius:999px;padding:9px 14px;color:#d7daf5;font-weight:800;font-size:14px}
.hero h2{font-size:clamp(42px,7vw,82px);line-height:.94;margin:18px 0 18px;letter-spacing:-3px}.grad{background:linear-gradient(90deg,#ff4bb2,#ffb84d,#22e7ff);-webkit-background-clip:text;background-clip:text;color:transparent}.hero p{color:#c8cbe1;font-size:18px;line-height:1.6;max-width:640px}.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}
.deal{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:32px;padding:18px;box-shadow:0 20px 80px rgba(0,0,0,.3)}.deal-inner{border-radius:26px;padding:28px;background:linear-gradient(135deg,rgba(255,46,159,.22),rgba(32,231,255,.16));border:1px solid rgba(255,255,255,.12)}.deal h3{font-size:42px;margin:8px 0}.price{font-size:64px;font-weight:1000}.price small{font-size:24px;color:#d9dcff}.chips{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.chip{background:rgba(255,255,255,.1);border-radius:16px;padding:13px;text-align:center;font-weight:800;color:#e8e9ff}
.toolbar{display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin:24px 0}.search{flex:1;min-width:240px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px 16px;color:white;outline:none}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{background:rgba(255,255,255,.08);color:#d9dcff;border:1px solid rgba(255,255,255,.1);padding:10px 14px;border-radius:999px;font-weight:900;cursor:pointer}.tab.active{background:white;color:#090912}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.card{background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.11);border-radius:24px;overflow:hidden;transition:.2s}.card:hover{transform:translateY(-4px);background:rgba(255,255,255,.09)}.stripe{height:7px;background:linear-gradient(90deg,#ff2e9f,#7c3cff,#22e7ff)}.cardin{padding:20px}.cat{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.1);color:#c9ccef;font-size:12px;font-weight:900}.card h3{font-size:24px;margin:14px 0 3px}.plan{color:#aeb2ce}.features{margin:16px 0;display:grid;gap:8px;color:#d9dcff;font-size:14px}.features span:before{content:"✓";color:var(--green);font-weight:1000;margin-right:8px}.card .price{font-size:44px;margin:12px 0}.row{display:flex;gap:10px}.row .btn{flex:1}
.trust{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:54px 0}.trust .item{padding:22px;border-radius:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}.item b{display:block;font-size:18px;margin-bottom:7px}.item p{margin:0;color:#aeb2ce}
.footer{border-top:1px solid rgba(255,255,255,.09);padding:28px 0;color:#aeb2ce;text-align:center;background:rgba(0,0,0,.25)}
.page{padding:42px 0}.panel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);border-radius:26px;padding:24px}.form{display:grid;gap:14px}.form input,.form select,.form textarea{width:100%;border-radius:14px;padding:13px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:white;outline:none}.form label{font-weight:800;color:#dfe2ff}.cartline{display:flex;justify-content:space-between;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.1)}.total{font-size:32px;font-weight:1000;text-align:right}.notice{border-left:4px solid var(--cyan);background:rgba(32,231,255,.08);padding:14px;border-radius:14px;color:#dfe2ff}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:10px;border-bottom:1px solid rgba(255,255,255,.1);text-align:left}.hide{display:none}
@media(max-width:950px){.hero-grid{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.trust{grid-template-columns:repeat(2,1fr)}.admin-grid{grid-template-columns:1fr}.links{display:none}}
@media(max-width:560px){.grid{grid-template-columns:1fr}.trust{grid-template-columns:1fr}.chips{grid-template-columns:1fr}.row{flex-direction:column}.hero h2{letter-spacing:-1px}}
</style>

<body>

<nav class="nav"><div class="wrap navin">
  <a class="brand" href="index.html"><div class="logo">Z</div><div><h1>Zest OTT</h1><p>Digital Authorized Online Store</p></div></a>
  <div class="links">
    <a class="btn dark small" href="index.html">Home</a>
    <a class="btn dark small" href="cart.html">Cart (<span data-cart-count>0</span>)</a>
    <a class="btn dark small" href="admin.html">Admin</a>
    <a class="btn green small" href="https://wa.me/9779743583995" target="_blank">WhatsApp</a>
  </div>
</div></nav>


<main class="wrap page">
  <h2>Buy Plan</h2>
  <div class="admin-grid">
    <div class="panel">
      <h3>Order Summary</h3>
      <div id="summary"></div>
    </div>
    <div class="panel">
      <h3>Customer Details</h3>
      <form class="form" id="orderForm">
        <label>Name<input id="customer" required placeholder="Your name"></label>
        <label>WhatsApp Number<input id="phone" required placeholder="Your WhatsApp number"></label>
        <label>Email / Account Email<input id="email" placeholder="Email for activation"></label>
        <label>Payment Method<select id="payment"><option>First activate, then pay</option><option>eSewa</option><option>Khalti</option><option>Bank Transfer</option></select></label>
        <label>Note<textarea id="note" rows="4" placeholder="Any request..."></textarea></label>
        <button class="btn green" type="submit">Confirm & Send WhatsApp</button>
      </form>
    </div>
  </div>
</main>

<script>
const WHATSAPP = "9743583995";
const PRODUCTS_DEFAULT = [{"id": 1, "name": "ChatGPT Pro", "plan": "1 Month", "price": 499, "category": "AI", "features": "Premium AI access, faster responses, sharing plan"}, {"id": 2, "name": "ChatGPT Pro", "plan": "2 Months", "price": 899, "category": "AI", "features": "Premium AI access, priority support, sharing plan"}, {"id": 3, "name": "ChatGPT Pro", "plan": "3 Months", "price": 1399, "category": "AI", "features": "Premium AI access, best value, sharing plan"}, {"id": 4, "name": "Netflix Premium", "plan": "1 Month", "price": 189, "category": "OTT", "features": "HD streaming, multiple devices, download & watch"}, {"id": 5, "name": "Netflix Premium", "plan": "2 Months", "price": 389, "category": "OTT", "features": "HD streaming, multiple devices, download & watch"}, {"id": 6, "name": "Netflix Premium", "plan": "3 Months", "price": 489, "category": "OTT", "features": "HD streaming, multiple devices, download & watch"}, {"id": 7, "name": "Netflix Premium", "plan": "6 Months", "price": 999, "category": "OTT", "features": "HD streaming, multiple devices, download & watch"}, {"id": 8, "name": "Netflix Premium", "plan": "12 Months", "price": 1649, "category": "OTT", "features": "HD streaming, multiple devices, download & watch"}, {"id": 9, "name": "YouTube Premium", "plan": "1 Month", "price": 189, "category": "OTT", "features": "Ad-free videos, background play, YouTube Music"}, {"id": 10, "name": "YouTube Premium", "plan": "3 Months", "price": 499, "category": "OTT", "features": "Ad-free videos, background play, YouTube Music"}, {"id": 11, "name": "YouTube Premium", "plan": "6 Months", "price": 799, "category": "OTT", "features": "Ad-free videos, background play, YouTube Music"}, {"id": 12, "name": "YouTube Premium", "plan": "1 Year", "price": 1249, "category": "OTT", "features": "Ad-free videos, background play, YouTube Music"}, {"id": 13, "name": "Spotify Premium", "plan": "3 Months", "price": 699, "category": "Music", "features": "Ad-free music, offline downloads, unlimited skips"}, {"id": 14, "name": "Spotify Premium", "plan": "6 Months", "price": 1249, "category": "Music", "features": "Ad-free music, offline downloads, unlimited skips"}, {"id": 15, "name": "Spotify Premium", "plan": "12 Months", "price": 1989, "category": "Music", "features": "Ad-free music, offline downloads, unlimited skips"}, {"id": 16, "name": "Microsoft Office 365", "plan": "Lifetime Key", "price": 1499, "category": "Software", "features": "Office apps, easy activation, 1 user"}, {"id": 17, "name": "Gemini AI Pro", "plan": "12 Months", "price": 1349, "category": "AI", "features": "AI assistant, 5TB storage, private & secure"}, {"id": 18, "name": "Gemini AI Pro", "plan": "18 Months", "price": 1849, "category": "AI", "features": "AI assistant, 5TB storage, private & secure"}, {"id": 19, "name": "Grok AI SuperGrok", "plan": "3 Months", "price": 999, "category": "AI", "features": "Advanced AI, real-time information, secure access"}, {"id": 20, "name": "Perplexity Pro", "plan": "1 Year", "price": 1899, "category": "AI", "features": "AI search, detailed sources, unlimited searches"}, {"id": 21, "name": "AI Power Trio", "plan": "3 Months", "price": 1999, "category": "Combo", "features": "ChatGPT + Claude + Grok, one combo, best price"}];

function getProducts(){
  const saved = localStorage.getItem("zest_products");
  return saved ? JSON.parse(saved) : PRODUCTS_DEFAULT;
}
function saveProducts(products){ localStorage.setItem("zest_products", JSON.stringify(products)); }
function getCart(){ return JSON.parse(localStorage.getItem("zest_cart") || "[]"); }
function saveCart(cart){ localStorage.setItem("zest_cart", JSON.stringify(cart)); updateCartCount(); }
function updateCartCount(){
  const el = document.querySelector("[data-cart-count]");
  if(el) el.textContent = getCart().length;
}
function addToCart(id){
  const p = getProducts().find(x=>x.id==id);
  const cart = getCart();
  cart.push(p);
  saveCart(cart);
  alert(p.name + " added to cart");
}
function buyNow(id){
  const p = getProducts().find(x=>x.id==id);
  localStorage.setItem("zest_buy", JSON.stringify([p]));
  location.href = "buy.html";
}
function sendWhatsApp(message){
  window.open("https://wa.me/977"+WHATSAPP+"?text="+encodeURIComponent(message), "_blank");
}
updateCartCount();
</script>
<script>
const order = JSON.parse(localStorage.getItem("zest_buy") || "[]");
function drawSummary(){
 const total = order.reduce((s,p)=>s+Number(p.price),0);
 summary.innerHTML = order.length ? order.map(p=>`<div class="cartline"><div><b>${p.name}</b><br><span class="plan">${p.plan}</span></div><b>Rs. ${p.price}</b></div>`).join("") + `<div class="total">Total: Rs. ${total}</div>` : `<p class="notice">No order selected.</p>`;
}
orderForm.addEventListener("submit", e=>{
 e.preventDefault();
 const total = order.reduce((s,p)=>s+Number(p.price),0);
 const receipt = {id:"ZEST-"+Date.now(), date:new Date().toLocaleString(), customer:customer.value, phone:phone.value, email:email.value, payment:payment.value, note:note.value, items:order, total};
 localStorage.setItem("zest_receipt", JSON.stringify(receipt));
 const items = order.map(p=>`${p.name} ${p.plan} - Rs. ${p.price}`).join("\n");
 sendWhatsApp(`Hello Zest OTT, I want to buy:\n${items}\nTotal: Rs. ${total}\nName: ${customer.value}\nPhone: ${phone.value}\nEmail: ${email.value}\nPayment: ${payment.value}\nNote: ${note.value}`);
 location.href = "receipt.html";
});
drawSummary();
</script>
